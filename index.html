<body>
    <header class="vh-100 d-flex align-items-center justify-content-center ">

        <form class="container d-flex flex-column gap-5 animate__animated animate__backInDown">
  <h1 class="text-white  text-center">Make your own quiz</h1>   
<div class="inputs">
 <div class=" input mb-3 ">
    <select class="category form-select" id="categoryMenu" aria-label="category Select">
              <option selected disabled class="d-none">Any Category</option>
              <option value="27">Animals</option>
              <option value="19">Mathematics</option>
              <option value="18">Computers</option>
              <option value="22">Geography</option>
              <option value="23">History</option>
              <option value="24">Politics</option>
              <option value="25">Art</option>
            </select>
           
         
 </div>
<div class="input mb-3">
       <select class="difficulty form-select" id="difficultyOptions" aria-label=" Select">
              <option selected disabled class="d-none">Choose diffeculty</option>
              <option  value="easy">Easy</option>
              <option value="medium">Medium</option>
              <option value="hard">Hard</option>
            </select>
        </div>

      <div class="input mb-3">
  <input type="number" class="number form-control" id="questionsNumber"
   placeholder="Number of Questions"/>
 
</div>
   <button type="submit" class="input btn btn-secondary">Start</button>

            
            </div>  

  
    

      </form>

          <div class="questions">
      <div class="container">
        <div class="row">
          
        </div>
      </div>
    </div>
    </header>

    <script src="./js/bootstrap.bundle.min.js"></script>
    <script src="./js/index.js"></script>
